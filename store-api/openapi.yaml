openapi: 3.0.3
info:
  title: Store API
  version: 1.0.0
  description: |
    A products / customers / orders CRUD store on top of an in-memory backend —
    the bare OpenAPI spec that `Openapi.scaffold` turns into a runnable project.

servers:
  - url: http://localhost:8080
    description: local dev

tags:
  - name: products
    description: Product catalog
  - name: customers
    description: Customer registry
  - name: orders
    description: Order placement and lookup

paths:
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products (optionally filtered by category)
      parameters:
        - name: category
          in: query
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Product' }
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '400':
          description: Validation error

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by id
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404':
          description: Not found
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Customer' }
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Customer' }
        '400':
          description: Validation error

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by id
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Customer' }
        '404':
          description: Not found

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Order' }
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place an order
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '400':
          description: Validation error
        '404':
          description: Customer not found
        '409':
          description: Stock conflict

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by id
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '404':
          description: Not found

components:
  schemas:
    Product:
      type: object
      required: [id, name, price]
      properties:
        id: { type: string }
        name: { type: string }
        price: { type: number }
        category: { type: string }

    ProductInput:
      type: object
      required: [name, price]
      properties:
        name: { type: string }
        price: { type: number }
        category: { type: string }

    Customer:
      type: object
      required: [id, name, email]
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string }

    CustomerInput:
      type: object
      required: [name, email]
      properties:
        name: { type: string }
        email: { type: string }

    OrderLineInput:
      type: object
      required: [productId, quantity]
      properties:
        productId: { type: string }
        quantity: { type: integer }

    OrderInput:
      type: object
      required: [customerId, lines]
      properties:
        customerId: { type: string }
        lines:
          type: array
          items: { $ref: '#/components/schemas/OrderLineInput' }

    Order:
      type: object
      required: [id, customerId, status, total]
      properties:
        id: { type: string }
        customerId: { type: string }
        status:
          type: string
          enum: [pending, completed, cancelled]
        total: { type: number }
        currency: { type: string }
        lines:
          type: array
          items: { $ref: '#/components/schemas/OrderLineInput' }
