# azure-demo on Azure Pipelines — the ALM-LINKED posture.
#
# Runs the karate-agent container one-shot over the full suite (rules oracle + REST API + browser UI via
# `launch`), then publishes JUnit to the Tests tab and the report + RTM as a build artifact. The pipeline
# derives its OWN org + project from the run's
# predefined variables and passes them as KARATE_ADO_ORG / KARATE_ADO_PROJECT, so every requirement id in the
# RTM click-throughs to its Azure DevOps User Story — no hardcoding. (The same kit runs pure-git on GitHub
# Actions, where those vars are unset.)
#
# License (site license, org-scoped): add a SECRET pipeline variable KARATE_LICENSE (the inline karate.lic
# text) — the same short secret name the GitHub Actions workflow uses. OR, since it's a lenient site license,
# your org can simply commit `.karate/karate.lic` into this folder and drop the secret entirely — the engine
# reads it straight from the mounted work dir (see the kit README).

trigger:
  branches: { include: [ main ] }
  paths:    { include: [ azure-demo ] }
pr:
  branches: { include: [ main ] }
  paths:    { include: [ azure-demo ] }
schedules:
  - cron: "0 2 * * *"
    displayName: Nightly regression
    branches: { include: [ main ] }
    always: true

pool:
  vmImage: ubuntu-latest

variables:
  KARATE_IMAGE: public.ecr.aws/karatelabs/karate-agent:2.1.1.RC5

steps:
  - checkout: self

  - script: |
      set -euo pipefail
      cd azure-demo
      # the karate-agent image runs as a NON-root user; pre-make target/ world-writable so it can write.
      mkdir -p target && chmod -R 777 target
      # derive org from the collection URI (https://dev.azure.com/<org>/) so the RTM links to THIS org/project.
      ADO_ORG=$(echo "$(System.TeamFoundationCollectionUri)" | sed -E 's#https?://dev.azure.com/([^/]+)/?#\1#')
      # `--pull=always` (tag iterated in beta). `launch suite.karate.js` serves the SUT + runs the WHOLE
      # suite (rules oracle + REST API + browser UI) as ONE consolidated report — HTML + JUnit (Tests tab) +
      # JSONL (coverage/RTM) + screenshots — written to target/karate-reports. The browser stage runs
      # non-headless under the image's Xvfb (real-render + screenshots); add -e KARATE_VIDEO=true for video.
      docker run --rm --pull=always \
        -v "$PWD":/work -w /work \
        -e KARATE_LICENSE_TEXT="$KARATE_LICENSE_TEXT" \
        -e KARATE_ADO_ORG="$ADO_ORG" \
        -e KARATE_ADO_PROJECT="$(System.TeamProject)" \
        "$(KARATE_IMAGE)" \
        launch suite.karate.js
    displayName: 'Karate: full suite (rules + REST + UI, ADO-linked RTM)'
    env:
      KARATE_LICENSE_TEXT: $(KARATE_LICENSE)   # map the KARATE_LICENSE secret var -> the engine's env (explicit)

  - task: PublishTestResults@2
    displayName: 'Publish results -> Tests tab'
    condition: always()
    inputs:
      testResultsFormat: JUnit
      testResultsFiles: '**/junit-xml/*.xml'
      failTaskOnFailedTests: true

  - task: PublishBuildArtifacts@1
    displayName: 'Publish report + RTM + evidence'
    condition: always()
    inputs:
      PathtoPublish: 'azure-demo/target/karate-reports'
      ArtifactName: karate-report
