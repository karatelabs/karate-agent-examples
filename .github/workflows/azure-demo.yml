# azure-demo on GitHub Actions — the PURE-GIT / spec-driven posture.
#
# Runs the karate-agent container one-shot over the headless rules oracle. No ADO coordinates are set, so the
# RTM treats the requirements markdown as the source of truth (ids render as plain text, no tracker) — the
# spec-driven-development story. The SAME kit runs ALM-linked on Azure Pipelines (azure-demo/azure-pipelines.yml).
#
# One-time setup: add a repository secret KARATE_LICENSE (the inline karate.lic text). Without it the engine's
# license check fails the run.
name: azure-demo (pure-git RTM)

on:
  push:
    paths: [ 'azure-demo/**', '.github/workflows/azure-demo.yml' ]
  pull_request:
    paths: [ 'azure-demo/**' ]
  workflow_dispatch:

permissions:
  contents: write        # peaceiris publishes the HTML report to the gh-pages branch
  checks: write          # dorny/test-reporter writes the JUnit check
  pull-requests: write

jobs:
  karate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: azure-demo
    steps:
      - uses: actions/checkout@v4

      - name: Karate rules oracle (headless, pure-git RTM)
        # `karate:jsonl` is required: coverage + the RTM are computed from that event stream.
        run: |
          IMAGE=public.ecr.aws/r3c9p5l5/karate-agent:2.1.1.RC4
          # ECR Public rate-limits ANONYMOUS pulls per source IP; GitHub's shared runners hit it, so pull
          # explicitly with a spaced retry (then run without --pull).
          for i in 1 2 3 4 5; do
            docker pull "$IMAGE" && break
            echo "registry throttled (attempt $i/5) — backing off"; sleep 30
          done
          # the karate-agent image runs as a NON-root user; pre-make target/ world-writable so the container
          # can write the report / JUnit / coverage into the runner-owned checkout.
          mkdir -p target && chmod -R 777 target
          # Pass the git coordinates for the pure-git RTM link: the requirement ids click through to
          # their heading in the markdown at THIS repo + commit. github.repository auto-follows a fork; github.sha
          # pins each link to the reviewed commit; the kit lives in the azure-demo/ subdir of the monorepo.
          docker run --rm \
            -v "$PWD":/work -w /work \
            -e KARATE_LICENSE_TEXT="$KARATE_LICENSE_TEXT" \
            -e KARATE_GIT_REPO_URL="https://github.com/${{ github.repository }}" \
            -e KARATE_GIT_REF="${{ github.sha }}" \
            -e KARATE_GIT_BASE="azure-demo" \
            "$IMAGE" \
            run oracle.feature checks/loan-api.feature -f junit:xml,html,karate:jsonl
        env:
          KARATE_LICENSE_TEXT: ${{ secrets.KARATE_LICENSE }}

      - name: Publish test results (Checks tab)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: karate tests
          path: 'azure-demo/target/karate-reports/**/junit-xml/*.xml'
          reporter: java-junit

      - name: Upload report + RTM + evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-report
          path: azure-demo/target/karate-reports

      # Publish the HTML report (RTM · coverage · summary) to GitHub Pages, per-kit subdir so kits don't
      # clobber each other. Browsable at https://<owner>.github.io/karate-agent-examples/azure-demo/.
      # One-time: enable Pages (Settings → Pages → Deploy from a branch → gh-pages).
      - name: Publish HTML report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: azure-demo/target/karate-reports
          destination_dir: azure-demo
          keep_files: true
